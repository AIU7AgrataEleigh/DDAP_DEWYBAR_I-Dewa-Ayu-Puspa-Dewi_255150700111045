<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Saya — Dewy Bar</title>
  <link class="ui-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style/global.css">
  <link rel="stylesheet" href="../../style/navbar.css">
  <link rel="stylesheet" href="../../style/footer.css">

  <link rel="stylesheet" href="../../style/katalog.css">

  <style>
    /* ============================================================
       STYLE UTAMA PROFILE BANNER & GRID
       ============================================================ */
    .profile-hero-container {
      position: relative;
      min-height: 650px;
      padding-top: 140px;
      padding-bottom: 60px;
      background-image: url('../../assets/img/profile/lb-profile.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .profile-grid-container {
      max-width: 1050px;
      margin: 0 auto;
    }

    .profile-left-box {
      background-color: #ffffff;
      color: var(--clr-dark);
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      height: 100%; /* Menyesuaikan tinggi kolom kanan */
      justify-content: center; /* Menjaga konten tetap di tengah secara vertikal */
      gap: 15px; /* Mengurangi jarak antar elemen agar lebih rapat */
    }
    /* Gaya khusus untuk Hi, Healthy Buddy */
    .profile-card__label {
      font-family: 'Covered By Your Grace', cursive; /* Menggunakan font sesuai permintaan */
      font-size: 22px; /* Ukuran font disesuaikan agar proporsional */
      color: #EEC044; /* Warna kuning emas */
      margin-bottom: 0; 
      text-transform: none; /* Menghilangkan uppercase */
      letter-spacing: 0;
      font-weight: 400;
    }

    .profile-card__name {
      margin-bottom: 0; /* Dihapus agar gap di atas yang mengaturnya */
    }

    .profile-avatar-box {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      object-fit: cover;
      border: 4px solid #F0F0F0;
      background-color: #4BAF47;
    }

    /* Biarkan tombol tetap memiliki desain aslinya */
    .btn-logout-action {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #d32f2f;
      font-size: var(--fs-sm);
      font-weight: 700;
      text-decoration: none;
      /* Kembalikan margin-top ke auto agar tetap menempel di bawah jika diinginkan, 
        atau hapus jika ingin benar-benar mengikuti gap */
      margin-top: 10px; 
      padding: 10px 20px;
      background-color: #ffeded;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .btn-logout-action:hover {
      background: #d32f2f;
      color: #ffffff;
    }

    .profile-right-box {
      padding: 40px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      height: 100%;
    }

    .profile-form-title {
      font-size: var(--fs-xl);
      font-weight: 800;
      color: var(--clr-dark);
      margin-bottom: 25px;
    }

    .profile-form .form-group {
      margin-bottom: 16px;
    }

    .profile-form .form-label {
      font-weight: 700;
      font-size: var(--fs-sm);
      color: #444444;
      margin-bottom: 6px;
    }

    .profile-form .form-input {
      width: 100%;
      padding: 10px 14px;
      background-color: #F7F7F7;
      border: 1px solid #E5E5E5;
      border-radius: 12px;
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--clr-dark);
    }

    /* ============================================================
       SECTION 1: FAVORITE PRODUCT
       ============================================================ */
    .profile-full-width-section {
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background-image: url('../../assets/img/profile/section1-profile.png'); 
      background-size: cover;
      background-position: center 0px;
      background-repeat: no-repeat;
      padding-top: 420px; 
      padding-bottom: 100px; 
      min-height: 900px;
      margin-top: 0; 
      margin-bottom: 0;
    }

    .profile-scroller-inner-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 25px;
    }

    .profile-horizontal-scroller {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      padding-bottom: 20px;
      padding-top: 10px;
      scrollbar-width: none;
    }
    
    .profile-horizontal-scroller::-webkit-scrollbar {
      display: none;
    }

    .profile-horizontal-scroller product-premium-card {
      display: block;
      flex-shrink: 0;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* ============================================================
       SECTION 2: OUR RECOMMENDATION (REKAT SEMPURNA KE FOOTER JS)
       ============================================================ */
    .katalog-section {
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      
      background-image: url('../../assets/img/profile/bg-section2-profile.png'); 
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      
      padding-top: 10px; 
      padding-bottom: 120px; /* Diturunkan proporsional, sisa ditarik footer */
      
      margin-top: 0;
      margin-bottom: 0 !important;
    }

    .katalog-section-header {
      text-align: center;
      margin-bottom: 35px; 
    }

    .font-covered-grace {
      font-family: 'Covered By Your Grace', cursive;
      font-size: 26px;
      color: #4BAF47;
      display: block;
      margin-bottom: 8px;
    }

    .katalog-section-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--clr-dark, #222222);
      margin: 0;
    }

    .katalog-scroll-container {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 25px 20px 25px;
      scrollbar-width: none;
    }

    .katalog-scroll-container::-webkit-scrollbar {
      display: none;
    }

    .katalog-scroll-container product-premium-card {
      display: block;
      flex-shrink: 0;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    @media (max-width: 768px) {
      .profile-left-box { height: auto; min-height: auto; margin-bottom: 20px; }
      .profile-full-width-section { padding-top: 250px; padding-bottom: 40px; min-height: auto; }
      .katalog-section { padding-top: 40px; padding-bottom: 60px; }
    }

    /* Mengubah background navbar dan menonaktifkan efek transparan/blur */
    .navbar {
      background-color: #4D4D4D !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      /* Tambahkan box-shadow jika ingin sedikit pemisah dengan konten di bawahnya */
      box-shadow: 0 4px 10px rgba(0,0,0,0.1) !important;
    }

    /* Memastikan teks dan link di navbar tetap terlihat jelas dengan warna putih */
    .navbar__menu-link, 
    .navbar__phone, 
    .navbar__cart,
    .navbar__social-circle {
      color: #ffffff !important;
    }

    /* Jika ada ikon di dalam menu, pastikan warnanya putih */
    .navbar__icon-wrapper {
      color: #ffffff !important;
    }

    .navbar__social-circle {
      background: rgba(255, 255, 255, 0.15) !important;
      color: #ffffff !important;
    }

    /* Jika ikon menggunakan tag <img> dan bukan <i>, gunakan filter invert */
    .navbar__social-circle img {
        filter: brightness(0) invert(1) !important;
    }

    /* ============================================================
        RESPONSIVE TAMBAHAN – PROFILE PAGE
        ============================================================ */

    /* TABLET (≤ 992px) */
    @media (max-width: 992px) {
        .profile-grid-container {
            padding-left: 15px;
            padding-right: 15px;
        }
    }

    /* HP (≤ 768px) */
    @media (max-width: 768px) {
        .form-input {
            font-size: 14px;
            padding: 10px 14px;
        }
        /* Tabel riwayat pesanan agar bisa di-scroll horizontal */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    }

    /* HP SANGAT KECIL (≤ 480px) */
    @media (max-width: 480px) {
        .profile-card__name {
            font-size: 1.3rem;
        }
    }
    </style>

      </style>

      <script>
        class ProductPremiumCard extends HTMLElement {
          connectedCallback() {
            const id    = this.getAttribute('id') || '';
            const name  = this.getAttribute('name') || '';
            const price = parseFloat(this.getAttribute('price')) || 0;
            const badge = this.getAttribute('badge') || 'Nutrition';
            const img   = this.getAttribute('img') || '../../assets/images/placeholder.svg';
            const type  = this.getAttribute('type') || 'mentah';
            const fmt   = new Intl.NumberFormat('id-ID').format(price);

            this.style.display  = 'block';
            this.style.flexShrink = '0';

            this.innerHTML = `
              <div class="product-premium-card" onclick="goToDetail('${id}','${type}')" style="margin-bottom:0;">
                <div class="prod-card-img-wrap">
                  <img class="prod-card-img" src="${img}" alt="${name}" onerror="this.src='../../assets/images/placeholder.svg'">
                </div>
                <div class="prod-card-body">
                  <p class="prod-card-title">${name}</p>
                  <p class="prod-card-price">Rp${fmt}</p>
                  <div class="prod-card-nutrition-container">
                    <div class="nutrition-white-pill">
                      <span class="nutrition-label-top">Nutrition Bar</span>
                      <span class="nutrition-value-text">${badge}</span>
                    </div>
                  </div>
                  <button class="prod-card-pilih-btn" onclick="event.stopPropagation(); addToCart({id:'${id}',name:'${name}',price:${price},img:'${img}',type:'${type}'})">
                    <img src="../../assets/svg/plus-circle-pilih.svg" alt="+" width="14" height="14">
                    Pilih
                  </button>
                </div>
              </div>`;
          }
        }
        customElements.define('product-premium-card', ProductPremiumCard);
      </script>
</head>

<div class="profile-hero-container">

          <img src="../../assets/img/profile/profile-photo.png" alt="Avatar" class="profile-avatar-box" id="profileAvatar" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%234BAF47%22/></svg>'">

          </label>
          <input type="file" id="avatarInput" accept="image/*" style="display:none;">
          <a href="#" onclick="handleLogout()" class="btn-logout-action"><i class="bi bi-box-arrow-right"></i> Logout Akun</a>
        </div>
      </div>

      <div class="col-md-8">

            </div>
            <div class="form-group">

            <div class="text-end mt-3">

          </div>

</div>
