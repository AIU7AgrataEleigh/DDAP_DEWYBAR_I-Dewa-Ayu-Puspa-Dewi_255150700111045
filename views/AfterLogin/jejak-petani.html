    /* ============================================================
       NAVBAR OVERRIDE (STICKY FIXED & TRANSPARAN DI ATAS HERO)
       ============================================================ */
    .navbar {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: transparent !important; 
      box-shadow: none !important;
      backdrop-filter: blur(4px); 
      -webkit-backdrop-filter: blur(4px);
    }

    .navbar__menu-link, .navbar__phone-number, .navbar__dropdown-name {
      color: #ffffff !important; 
    }
    
    .navbar__social-circle {
      background: rgba(255, 255, 255, 0.2) !important;
      color: #ffffff !important;
    }

    .navbar__hamburger span {
      background: #ffffff !important;
    }
    .navbar__icon-wrapper { color: #ffffff !important; }
    .navbar__cart { color: #ffffff !important; }
      width: 100%;
      position: relative;
      overflow: hidden;
      line-height: 0;
      background: #f8faf9;
      padding-top: 0 !important; 
    }
    
    .jp-hero-clean-img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ============================================================
       PERBAIKAN GESER KANAN & ANTI-NABRAK (PAS & BALANCED)
       ============================================================ */
    .jp-custom-badge-kuning {
      background-color: #EEC044 !important;
      color: #ffffff !important;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 6px; 
      border: none;
      box-shadow: 0px 4px 10px rgba(238, 192, 68, 0.15);
      
      /* Menggeser badge daerah ke kanan agar lurus vertikal dengan konten utama */
      margin-left: 28px !important; 
    }

    .katalog-scroll-container {
      display: flex !important;
      flex-wrap: nowrap !important;
      overflow-x: auto !important;
      gap: 20px !important;
      
      /* Memberikan ruang dalam di sebelah kiri agar kartu pertama tidak menempel screen */
      padding-left: 28px !important;  
      padding-right: 35px !important; 
      padding-bottom: 15px !important;
      
      /* Mengunci snap-scroll pas di koordinat padding baru */
      scroll-padding-left: 28px !important;
      
      margin-left: 0 !important;
      margin-right: 0 !important;
      scroll-behavior: smooth;
    }

    /* Jarak vertikal antar susunan katalog */
    .katalog-section {
      margin-top: 0 !important;
      margin-bottom: 30px !important; 
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }

    .jp-main-content-wrapper {
      margin-top: 10px !important;
    }

    .farmer-premium-card {
      flex: 0 0 auto !important;
    }
  </style>
</head>

        </div>
        <div class="navbar__dropdown" id="profileDropdown">
          <div class="navbar__dropdown-name" id="userName">Pengguna</div>

<!-- HERO BANNER -->
<section class="jp-hero-container">
  <img src="../../assets/img/produk-petani/jp-hero.png" alt="Pahlawan Pangan Lokal" class="jp-hero-clean-img" onerror="this.src='../../assets/img/logo_profile.img.png'">
</section>

<!-- JUDUL UTAMA -->
<div class="text-center mt-4 mb-3">
  <span class="font-covered-grace">Plan it Specially</span>

<!-- CONTAINER UTAMA -->
<main class="container px-3 jp-main-content-wrapper">
  
  <!-- SECTION 1: PONCOKUSUMO -->
  <section class="katalog-section">
    <div class="mb-2">
      <div class="jp-custom-badge-kuning"><i class="bi bi-geo-alt-fill"></i> Poncokusumo</div>

  <!-- SECTION 4: DAU -->

<!-- FOOTER CONTAINER AUTOMATIC (Mengikuti Standard Global Katalog Mentah) -->

<!-- SCRIPT DEPENDENCIES -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../javascript/auth.js"></script>
<script src="../../javascript/cart.js"></script>
<script src="../../javascript/navbar.js"></script>
<script src="../../javascript/katalog.js"></script>
<script src="../../javascript/main.js"></script>

<script>
  if (typeof requireLogin === 'function') requireLogin();

  // DATA SOURCE JEJAK PETANI
  const MASTER_PETANI_DATA = [
    { id: "petani-1", name: "Budi Santoso", lokasi: "Poncokusumo", img: "../../assets/img/petani/budi.png", crops: ["pisang.png", "apel.png", "stroberi.png"], wilayah: "poncokusumo" },
    { id: "petani-2", name: "Pak Haji Rustam", lokasi: "Poncokusumo", img: "../../assets/img/petani/pak-haji.png", crops: ["mangga.png", "alpukat.png"], wilayah: "poncokusumo" },
    { id: "petani-3", name: "Sari Handayani", lokasi: "Poncokusumo", img: "../../assets/img/petani/handayani.png", crops: ["stroberi.png", "naga.png"], wilayah: "poncokusumo" },
    { id: "petani-4", name: "Mang Dadang", lokasi: "Poncokusumo", img: "../../assets/img/petani/dadang.png", crops: ["pisang.png", "pepaya.png"], wilayah: "poncokusumo" },
    { id: "petani-5", name: "Fajar Hidayat", lokasi: "Batu", img: "../../assets/img/petani/fajar.png", crops: ["pisang.png", "stroberi.png"], wilayah: "batu" },
    { id: "petani-6", name: "Bli Wayan", lokasi: "Batu", img: "../../assets/img/petani/bli.png", crops: ["apel.png", "jeruk.png"], wilayah: "batu" },
    { id: "petani-7", name: "Cak Imron", lokasi: "Batu", img: "../../assets/img/petani/imron.png", crops: ["semangka.png", "melon.png"], wilayah: "batu" },
    { id: "petani-8", name: "Martha Sitorus", lokasi: "Batu", img: "../../assets/img/petani/martha.png", crops: ["apel.png"], wilayah: "batu" },
    { id: "petani-9", name: "Siti Aisyah", lokasi: "Kepanjen", img: "../../assets/img/petani/siti.png", crops: ["pir.png"], wilayah: "kepanjen" },
    { id: "petani-10", name: "Pak Slamet", lokasi: "Kepanjen", img: "../../assets/img/petani/pak-slamet.png", crops: ["timun.png", "selada.png"], wilayah: "kepanjen" },
    { id: "petani-11", name: "Kang Asep", lokasi: "Kepanjen", img: "../../assets/img/petani/kang-asep.png", crops: ["jagung.png", "tomat.png"], wilayah: "kepanjen" },
    { id: "petani-12", name: "Ibu Ni Luh", lokasi: "Kepanjen", img: "../../assets/img/petani/ibu-ni-luh.png", crops: ["bayam.png", "brokoli.png"], wilayah: "kepanjen" },
    { id: "petani-13", name: "Citra Lestari", lokasi: "Dau", img: "../../assets/img/petani/citra.png", crops: ["labu.png", "brokoli.png"], wilayah: "dau" },
    { id: "petani-14", name: "Pak Mansur", lokasi: "Dau", img: "../../assets/img/petani/pak-mansyur.png", crops: ["wortel.png", "bayam.png"], wilayah: "dau" },
    { id: "petani-15", name: "Pak Dedi", lokasi: "Dau", img: "../../assets/img/petani/pak-dedi.png", crops: ["brokoli.png", "wortel.png"], wilayah: "dau" },
    { id: "petani-16", name: "Mas Bayu", lokasi: "Dau", img: "../../assets/img/petani/mas-bayu.png", crops: ["jagung.png", "tomat.png"], wilayah: "dau" }
  ];

  function renderFarmerCard(farmer) {
    const cropsHtml = farmer.crops.map(crop => `
      <div class="farmer-crop-direct">
        <img src="../../assets/img/produk-petani/${crop}" alt="Crop" onerror="this.src='../../assets/img/logo_profile.img.png'">
      </div>
    `).join('');

    return `
      <div class="farmer-premium-card" onclick="goToFarmerDetail('${farmer.id}')">
        <div class="farmer-avatar-wrap">
          <img class="farmer-avatar" src="${farmer.img}" alt="${farmer.name}" onerror="this.src='../../assets/img/logo_profile.img.png'">
          <div class="farmer-badge-home-accent">
            <i class="bi bi-house-door-fill" style="color: #49A760; font-size: 14px;"></i>
          </div>
        </div>

        <div class="farmer-info-block">
          <p class="farmer-card-name">${farmer.name}</p>
          <p class="farmer-card-loc">${farmer.lokasi}</p>
        </div>

        <div class="farmer-products-label">
          <i class="bi bi-patch-check-fill" style="color:#ffffff;"></i>
          <span>Products</span>
        </div>

        <div class="farmer-mini-crops">
          ${cropsHtml}
        </div>

        <button class="farmer-action-wide-btn">
          LIHAT DETAIL PRODUK
        </button>
      </div>
    `;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const regions = ["poncokusumo", "batu", "kepanjen", "dau"];
    regions.forEach(reg => {
      const targetGrid = document.getElementById(`grid${reg.charAt(0).toUpperCase() + reg.slice(1)}`);
      if (targetGrid) {
        const filteredFarmers = MASTER_PETANI_DATA.filter(p => p.wilayah === reg);
        targetGrid.innerHTML = filteredFarmers.length
          ? filteredFarmers.map(renderFarmerCard).join('')
          : '<div style="color:#888;text-align:center;padding:12px 0;">Tidak ada data petani untuk wilayah ini.</div>';
      }
    });
  });

  function goToFarmerDetail(id) {
    window.location.href = `profil-petani.html?id=${id}`;
  }
</script>
</body>
</html>
