<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar — Dewy Bar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../style/global.css">
  <link rel="stylesheet" href="../../style/footer.css">
  <link rel="stylesheet" href="../../style/auth.css">
</head>
<body>

<div class="auth-back">
  <a href="../../index.html" class="back-pill"><i class="bi bi-arrow-left"></i> Back To Home</a>
</div>

<div class="auth-layout">
  <div class="auth-left">
    <img src="../../assets/img/login-register/bg-hijau.png" alt="Pattern" class="auth-left__bg">
    
    <div class="auth-left__content-flat">
      <img src="../../assets/img/login-register/jeruk.png " alt="Please Fill Your Data" class="auth-left__flat-card-img">
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrap">
      <p class="auth-eyebrow">So Nice To See You!</p>
      <h2 class="auth-title">Hai, New Member</h2>

      <div class="auth-alert" id="registerError"></div>

      <div class="auth-form">
        <div class="form-group">
          <label class="form-label">Nama</label>
          <input type="text" id="regName" class="form-input" placeholder="Masukkan nama kamu">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-input" placeholder="Format: email@com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative;">
            <input type="password" id="regPassword" class="form-input" placeholder="Masukkan password" style="padding-right:3rem;">
            <button type="button" onclick="togglePass('regPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--clr-gray-400);">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Konfirmasi Password</label>
          <input type="password" id="regConfirm" class="form-input" placeholder="Masukkan password yang sama seperti sebelumnya">
        </div>
        
        <div class="auth-btn-container">
          <button class="auth-btn" id="registerBtn" onclick="handleRegister()">SIGN UP</button>
        </div>
      </div>

      <p class="auth-switch">Sudah punya akun? <a href="login-page.html">Log In</a></p>
    </div>
  </div>
</div>

<div id="footer-container"></div>

<script src="../../javascript/auth.js"></script>
<script src="../../javascript/main.js"></script>
<script>
function togglePass(id, btn) {
  const input = document.getElementById(id);
  const isPass = input.type === 'password';
  input.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
}
</script>
</body>
</html>
